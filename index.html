<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Elephant & Castle Sound Map</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Space Grotesk", sans-serif;
  background: #e9e3d3;
  color: #2b2b2b;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.frame {
  width: min(92vw, 950px);
  background: #f6f1e6;
  border: 2px solid #d6cfc2;
  border-radius: 18px;
  padding: 16px;
}

h1 {
  font-size: 1.4rem;
}

.subtitle {
  font-size: 0.9rem;
  color: #6b645c;
  margin-bottom: 10px;
}

.map-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1708 / 1329;
  border-radius: 12px;
  overflow: hidden;
  background: #dcd5c6;
  border: 2px solid #c8c1b2;
}

.map-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* PIN */

.pin {
  position: absolute;
  width: clamp(26px, 8vw, 74px);
  transform: translate(-50%, -100%);
  cursor: pointer;
  z-index: 1;
}

.pin img {
  width: 100%;
  transition: transform 0.2s ease;
}

.pin:hover img {
  transform: scale(1.1);
}

.pin.active img {
  transform: scale(1.2);
}

/* tooltip */

.pin::after {
  content: attr(data-label);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translate(-50%, -8px);
  background: #fffdf8;
  border: 1px solid #cfc6b5;
  padding: 4px 8px;
  font-size: 11px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
}

.pin:hover {
  z-index: 5000;
}

.pin:hover::after {
  opacity: 1;
}

/* PLAYER */

.player {
  margin-top: 10px;
  background: #f1eadf;
  border: 2px solid #d6cfc2;
  border-radius: 12px;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #c0392b;
  margin-right: 8px;
}

.player.playing .status-dot {
  background: #2e7d32;
}

.track-title {
  font-size: 0.95rem;
}

button {
  background: none;
  border: 1px solid #bbb;
  padding: 6px 10px;
  border-radius: 20px;
  cursor: pointer;
}


</style>
</head>

<body>

<div class="frame">
<h1>Elephant & Castle – Sound Map</h1>
<p class="subtitle">Click a location to hear its sound</p>

<div class="map-wrapper">
<img src="map.png">

<!-- PINS (positioned for YOUR illustration) -->

<div class="pin" data-sound="1" style="left:39%; top:17%;"><img src="pin.png"></div>
<div class="pin" data-sound="2" style="left:21%; top:83%;"><img src="pin.png"></div>
<div class="pin" data-sound="3" style="left:64%; top:53%;"><img src="pin.png"></div>
<div class="pin" data-sound="4" style="left:49%; top:42%;"><img src="pin.png"></div>
<div class="pin" data-sound="5" style="left:63%; top:76%;"><img src="pin.png"></div>
<div class="pin" data-sound="6" style="left:28%; top:54%;"><img src="pin.png"></div>
<div class="pin" data-sound="7" style="left:38%; top:78%;"><img src="pin.png"></div>
<div class="pin" data-sound="8" style="left:47%; top:55%;"><img src="pin.png"></div>
<div class="pin" data-sound="9" style="left:44%; top:30%;"><img src="pin.png"></div>
<div class="pin" data-sound="10" style="left:52%; top:37%;"><img src="pin.png"></div>
<div class="pin" data-sound="11" style="left:76%; top:52%;"><img src="pin.png"></div>
<div class="pin" data-sound="12" style="left:61%; top:26%;"><img src="pin.png"></div>
<div class="pin" data-sound="13" style="left:30%; top:35%;"><img src="pin.png"></div>
<div class="pin" data-sound="14" style="left:58%; top:82%;"><img src="pin.png"></div>

</div>

<div class="player" id="playerBar">
  <div style="display:flex; align-items:center;">
    <div class="status-dot"></div>
    <div class="track-title" id="nowPlaying">Nothing playing</div>
  </div>
  <button id="stopAll">Stop</button>
</div>

</div>

<script>
const names = {
1:"Borough Rd",
2:"Cinema Museum",
3:"Elephant Rd – Castle Square",
4:"Elephant Square",
5:"Heygate St",
6:"Imperial War Museum – Brook Dr",
7:"Kennington Park Rd",
8:"London College of Communication",
9:"London Rd",
10:"Ministry of Sound",
11:"New Kent Rd",
12:"Mercato Metropolitano",
13:"St George’s Rd",
14:"Walworth Rd"
};

const files = {
1:"BOROUGH RD_1.mp3",
2:"CINEMA MUSEUM_1.mp3",
3:"ELEPHANT RD - CASTLE SQUARE.mp3",
4:"ELEPHANT SQUARE_1.mp3",
5:"HEYGATE ST_1.mp3",
6:"IMPERIAL WAR MUSEUM - BROOK DR.mp3",
7:"KENNINGTON PARK RD_1.mp3",
8:"LONDON COLLEGE OF COMMUNICATION_1.mp3",
9:"LONDON RD_1.mp3",
10:"MINISTRY OF SOUND - NEWINGTON CAUSEWAY.mp3",
11:"NEW KENT RD_1.mp3",
12:"NEWINGTON CAUSEWAY - MERCATO METROPOLITANO.mp3",
13:"ST. GEORGE ROAD_1.mp3",
14:"WALWORTH RD_1.mp3"
};

const pins = document.querySelectorAll('.pin');
const now = document.getElementById('nowPlaying');
const bar = document.getElementById('playerBar');
const stopBtn = document.getElementById('stopAll');

let audio = null;
let activePin = null;

function stop() {
  if(audio){
    audio.pause();
    audio.currentTime = 0;
  }
  if(activePin) activePin.classList.remove('active');
  audio = null;
  activePin = null;
  now.textContent = "Nothing playing";
  bar.classList.remove('playing');
}

pins.forEach(pin=>{
  const id = pin.dataset.sound;
  pin.setAttribute("data-label", names[id]);

  pin.onclick = ()=>{
    if(activePin === pin){
      stop();
      return;
    }

    stop();

    audio = new Audio("audio/" + files[id]);
    activePin = pin;
    pin.classList.add("active");

    now.textContent = names[id];
    bar.classList.add("playing");

    audio.play();
    audio.onended = stop;
  };
});

stopBtn.onclick = stop;
</script>

</body>
</html>
